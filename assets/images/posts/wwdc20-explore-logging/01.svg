<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Explore logging in Swift 主题思维导图</title>
  <desc id="desc">概括新版 Logger API、日志收集、等级、格式化、隐私保护与系统可用性的思维导图。</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffaf5"/>
      <stop offset="1" stop-color="#ffedd5"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#7c2d12" flood-opacity="0.12"/>
    </filter>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif; fill: #292524; }
      .eyebrow { font-size: 22px; font-weight: 700; letter-spacing: 0.14em; fill: #c2410c; }
      .heading { font-size: 52px; font-weight: 750; }
      .subtitle { font-size: 23px; fill: #78716c; }
      .card-title { font-size: 28px; font-weight: 700; }
      .card-copy { font-size: 21px; fill: #57534e; }
      .center-title { font-size: 40px; font-weight: 760; fill: #fff7ed; }
      .center-copy { font-size: 23px; fill: #fed7aa; }
      .connector { fill: none; stroke: #fb923c; stroke-width: 6; stroke-linecap: round; opacity: 0.75; }
      .dot { fill: #c2410c; }
      .card { fill: #ffffff; stroke: #fed7aa; stroke-width: 2; }
    </style>
  </defs>

  <rect width="1600" height="1000" rx="36" fill="url(#background)"/>
  <circle cx="1425" cy="90" r="170" fill="#fdba74" opacity="0.18"/>
  <circle cx="175" cy="920" r="210" fill="#fb923c" opacity="0.12"/>

  <text x="800" y="72" text-anchor="middle" class="eyebrow">WWDC20 · SESSION 10168</text>
  <text x="800" y="135" text-anchor="middle" class="heading">Explore logging in Swift</text>
  <text x="800" y="179" text-anchor="middle" class="subtitle">高效、可检索，并且尊重用户隐私的统一日志</text>

  <path class="connector" d="M600 430 C515 430 520 300 470 300"/>
  <path class="connector" d="M600 500 C515 500 520 520 470 520"/>
  <path class="connector" d="M600 570 C515 570 520 740 470 740"/>
  <path class="connector" d="M1000 430 C1085 430 1080 300 1130 300"/>
  <path class="connector" d="M1000 500 C1085 500 1080 520 1130 520"/>
  <path class="connector" d="M1000 570 C1085 570 1080 740 1130 740"/>

  <g filter="url(#shadow)">
    <rect x="600" y="375" width="400" height="250" rx="34" fill="#9a3412"/>
    <circle cx="800" cy="430" r="24" fill="#fdba74"/>
    <path d="M789 430h22M800 419v22" stroke="#7c2d12" stroke-width="5" stroke-linecap="round"/>
    <text x="800" y="500" text-anchor="middle" class="center-title">Logger</text>
    <text x="800" y="542" text-anchor="middle" class="center-copy">统一日志 API</text>
    <text x="800" y="577" text-anchor="middle" class="center-copy">快速 · 清晰 · 安全</text>
  </g>

  <g filter="url(#shadow)">
    <rect class="card" x="70" y="220" width="400" height="160" rx="26"/>
    <circle class="dot" cx="112" cy="263" r="10"/>
    <text x="140" y="273" class="card-title">新版 Logger API</text>
    <text x="112" y="318" class="card-copy">Logger · 字符串插值 · 多种数据类型</text>
    <text x="112" y="349" class="card-copy">只在显示时承担格式化成本</text>

    <rect class="card" x="70" y="440" width="400" height="160" rx="26"/>
    <circle class="dot" cx="112" cy="483" r="10"/>
    <text x="140" y="493" class="card-title">日志等级</text>
    <text x="112" y="538" class="card-copy">Debug · Info · Notice · Error · Fault</text>
    <text x="112" y="569" class="card-copy">按等级平衡持久化与性能</text>

    <rect class="card" x="70" y="660" width="400" height="160" rx="26"/>
    <circle class="dot" cx="112" cy="703" r="10"/>
    <text x="140" y="713" class="card-title">隐私保护</text>
    <text x="112" y="758" class="card-copy">public · private</text>
    <text x="112" y="789" class="card-copy">equality-preserving hash</text>
  </g>

  <g filter="url(#shadow)">
    <rect class="card" x="1130" y="220" width="400" height="160" rx="26"/>
    <circle class="dot" cx="1172" cy="263" r="10"/>
    <text x="1200" y="273" class="card-title">收集与检视</text>
    <text x="1172" y="318" class="card-copy">log collect · Console.app</text>
    <text x="1172" y="349" class="card-copy">归档、筛选与实时串流</text>

    <rect class="card" x="1130" y="440" width="400" height="160" rx="26"/>
    <circle class="dot" cx="1172" cy="483" r="10"/>
    <text x="1200" y="493" class="card-title">格式化</text>
    <text x="1172" y="538" class="card-copy">align · precision · 数据可视化</text>
    <text x="1172" y="569" class="card-copy">提升可读性，无额外运行时开销</text>

    <rect class="card" x="1130" y="660" width="400" height="160" rx="26"/>
    <circle class="dot" cx="1172" cy="703" r="10"/>
    <text x="1200" y="713" class="card-title">系统可用性</text>
    <text x="1172" y="758" class="card-copy">iOS 14 · macOS 11 · watchOS 7</text>
    <text x="1172" y="789" class="card-copy">tvOS 14 · Xcode 12</text>
  </g>

  <text x="800" y="935" text-anchor="middle" class="subtitle">基于文章内容重建 · 原始图片源已失效</text>
</svg>
