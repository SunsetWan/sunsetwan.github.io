    <script type="text/javascript">
  (function() {
    try {
      var storedTheme = localStorage.getItem('theme');
      if (storedTheme === 'light' || storedTheme === 'dark') {
        document.documentElement.setAttribute('data-theme', storedTheme);
      }
    } catch (_) {}
  })();

  function themeChange() {
    var button = document.querySelector('.theme-toggle');
    if (!button) return;

    function effectiveTheme() {
      var selected = document.documentElement.getAttribute('data-theme');
      if (selected === 'auto') {
        return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      }
      return selected;
    }

    function updateIcon(theme) {
      button.setAttribute('aria-pressed', theme === 'dark' ? 'true' : 'false');
      button.setAttribute('aria-label', theme === 'dark' ? button.dataset.labelLight : button.dataset.labelDark);
      button.querySelector('.icon-sun').style.display = theme === 'dark' ? 'block' : 'none';
      button.querySelector('.icon-moon').style.display = theme === 'dark' ? 'none' : 'block';
    }

    updateIcon(effectiveTheme());

    button.addEventListener('click', function () {
      var currentTheme = effectiveTheme();
      var next = currentTheme === 'dark' ? 'light' : 'dark';

      transition();
      document.documentElement.setAttribute('data-theme', next);
      try { localStorage.setItem('theme', next); } catch (_) {}
      updateIcon(next);
    });

    var colorScheme = window.matchMedia('(prefers-color-scheme: dark)');
    var syncAutoTheme = function() {
      if (document.documentElement.getAttribute('data-theme') === 'auto') {
        updateIcon(effectiveTheme());
      }
    };
    if (colorScheme.addEventListener) colorScheme.addEventListener('change', syncAutoTheme);

    function transition() {
      document.documentElement.classList.add('transition');
      window.setTimeout(function () {
        document.documentElement.classList.remove('transition');
      }, 1000);
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', themeChange);
  } else {
    themeChange();
  }
</script>

<div class="search">
  <input
    type="search"
    id="search-input"
    class="search-input"
    placeholder="搜索文章……"
    aria-label="搜索文章"
    autocomplete="off"
    data-index-url="/search.json"
    data-max-results="8"
    data-no-results="没有找到与“{query}”匹配的文章"
    data-load-error="暂时无法加载搜索索引。"
  >
  <ul id="search-results" class="search-results" aria-live="polite" aria-relevant="additions text" hidden></ul>
</div>

<script>
(function() {
  var input = document.getElementById('search-input');
  var list = document.getElementById('search-results');
  if (!input || !list) return;
  var maxResults = Number(input.dataset.maxResults) || 8;

  var index = null;
  function loadIndex() {
    return fetch(input.dataset.indexUrl)
      .then(function(r) {
        if (!r.ok) throw new Error('Search index request failed');
        return r.json();
      })
      .then(function(data) { index = Array.isArray(data) ? data : []; return index; });
  }

  function score(p, q) {
    var s = 0;
    var ql = q.toLowerCase();
    if ((p.title || '').toLowerCase().indexOf(ql) !== -1) s += 5;
    if ((p.tags || []).some(function(t) { return String(t).toLowerCase().indexOf(ql) !== -1; })) s += 3;
    if ((p.excerpt || '').toLowerCase().indexOf(ql) !== -1) s += 1;
    return s;
  }
  function escape(s) {
    return String(s || '').replace(/[&<>"']/g, function(c) {
      return { '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c];
    });
  }
  function render(results, q) {
    if (!results.length) {
      var message = input.dataset.noResults.replace('{query}', escape(q));
      list.innerHTML = '<li class="search-empty">' + message + '</li>';
      list.hidden = false;
      return;
    }
    list.innerHTML = results.slice(0, maxResults).map(function(p) {
      return '<li class="search-result">' +
        '<a href="' + escape(p.url) + '">' +
        '<span class="search-result-body">' +
        '<span class="search-result-title">' + escape(p.title) + '</span>' +
        (p.excerpt ? '<span class="search-result-excerpt">' + escape(p.excerpt) + '</span>' : '') +
        '</span>' +
        '<span class="search-result-date">' + escape(p.date) + '</span>' +
        '</a></li>';
    }).join('');
    list.hidden = false;
  }

  input.addEventListener('input', function() {
    var q = input.value.trim();
    if (!q) { list.hidden = true; list.innerHTML = ''; return; }
    var run = function() {
      var hits = index.map(function(p) { return [score(p, q), p]; })
                      .filter(function(r) { return r[0] > 0; })
                      .sort(function(a, b) { return b[0] - a[0]; })
                      .map(function(r) { return r[1]; });
      render(hits, q);
    };
    if (!index) {
      loadIndex().then(run).catch(function() {
        list.innerHTML = '<li class="search-empty">' + escape(input.dataset.loadError) + '</li>';
        list.hidden = false;
      });
    } else {
      run();
    }
  });
})();
</script>
